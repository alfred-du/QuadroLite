camera:
  # Backend: auto | picamera2 | opencv
  # auto tries picamera2 first, falls back to opencv (V4L2/USB)
  backend: auto
  # OpenCV device index or path (e.g. 0, "/dev/video0"); ignored by picamera2
  device: 0
  width: 640
  height: 480
  fps: 30
  hflip: false
  vflip: false
  # AWB mode (picamera2 only): auto | incandescent | tungsten | fluorescent | indoor | daylight | cloudy
  awb_mode: fluorescent
  # Override AWB with fixed gains: [red_gain, blue_gain] (e.g. [1.5, 1.8])
  # colour_gains: null

pipeline:
  queue_size: 2
  drop_stale_frames: true

hand_landmarker:
  palm_model_path: models/palm_detection_mediapipe_2023feb.onnx
  hand_model_path: models/handpose_estimation_mediapipe_2023feb.onnx
  num_hands: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

gesture_classifier:
  backend: rule_based
  model_path: null
  gestures:
    - name: open_palm
      action: forward
    - name: fist
      action: stop

dispatch:
  handler: terminal
  preview:
    enabled: true
    port: 8080
  servo:
    pin_pan: 12
    pin_tilt: 13
